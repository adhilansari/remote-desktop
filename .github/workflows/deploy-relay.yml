name: Deploy Relay Server to EC2

on:
  push:
    branches: [ "main" ]
    paths:
      - 'keenfresh-relay/**'
      - 'keenfresh-shared/**'
      - 'docker-compose.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Navigate to project directory
            cd keenfresh
            
            # 2. Pull the latest code from GitHub
            git fetch origin
            git reset --hard origin/main
            
            # 3. Stop legacy PM2 instances to free up Port 3000
            # (If the server was previously deployed via deploy-aws.js, PM2 will block Docker from binding to port 3000)
            pm2 delete keenfresh-relay || true
            pm2 save --force || true
            
            # 4. Stop existing Docker containers
            sudo docker compose down || true
            
            # 5. Clear corrupted BuildKit cache to fix 'snapshot not found' errors
            sudo docker builder prune -f
            
            # 6. Build and start the containers from scratch (no-cache prevents snapshot issues)
            sudo docker compose build --no-cache
            sudo docker compose up -d
            
            # 7. Safely remove old dangling images only AFTER the new container is running
            sudo docker system prune -f
