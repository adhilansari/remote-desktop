name: Deploy Relay Server to EC2

on:
  push:
    branches: [ "main" ]
    paths:
      - 'keenfresh-relay/**'
      - 'keenfresh-shared/**'
      - 'docker-compose.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Navigate to project directory
            cd keenfresh
            
            # 2. Pull the latest code from GitHub
            git fetch origin
            git reset --hard origin/main
            
            # 3. Stop existing containers
            sudo docker compose down || true
            
            # 4. Clear corrupted BuildKit cache to fix 'snapshot not found' errors
            sudo docker builder prune -f
            
            # 5. Build and start the containers from scratch (no-cache prevents snapshot issues)
            sudo docker compose build --no-cache
            sudo docker compose up -d
            
            # 6. Safely remove old dangling images only AFTER the new container is running
            sudo docker system prune -f
