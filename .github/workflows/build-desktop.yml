name: Build Desktop App

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-13]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies (shared)
        working-directory: ./keenfresh-shared
        run: npm ci

      - name: Build shared library
        working-directory: ./keenfresh-shared
        run: npm run build

      - name: Install dependencies (desktop)
        working-directory: ./keenfresh-desktop
        run: npm ci

      - name: Build Windows App
        if: matrix.os == 'windows-latest'
        working-directory: ./keenfresh-desktop
        run: npm run pack:win

      - name: Build Mac App
        if: matrix.os == 'macos-13'
        working-directory: ./keenfresh-desktop
        run: npm run pack:mac

      - name: Install Linux Build Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxtst-dev libpng-dev libfuse2

      - name: Build Linux App
        if: matrix.os == 'ubuntu-latest'
        working-directory: ./keenfresh-desktop
        run: npm run pack:linux

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.os }}
          path: |
            keenfresh-desktop/release/*.exe
            keenfresh-desktop/release/*.dmg
            keenfresh-desktop/release/*.AppImage
            keenfresh-desktop/release/*.deb
            keenfresh-desktop/release/*.yml
            keenfresh-desktop/release/*.blockmap
            keenfresh-desktop/release/*.zip
          retention-days: 1
          if-no-files-found: ignore

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: artifacts-*
          merge-multiple: true
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**
          draft: false
          prerelease: false
          generate_release_notes: true
