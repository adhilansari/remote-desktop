name: Build Desktop App

on:
  push:
    branches: [ "main" ]
    paths:
      - 'keenfresh-desktop/**'
      - 'keenfresh-shared/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies (shared)
        working-directory: ./keenfresh-shared
        run: npm ci

      - name: Build shared library
        working-directory: ./keenfresh-shared
        run: npm run build

      - name: Install dependencies (desktop)
        working-directory: ./keenfresh-desktop
        run: npm ci

      - name: Build and Pack Desktop App
        working-directory: ./keenfresh-desktop
        run: npm run pack:win
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: KeenFresh-Windows-Installer
          path: keenfresh-desktop/release/*.exe
          retention-days: 7
