<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>KeenFresh Remote Viewer</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #000;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #fff;
      font-family: sans-serif;
    }
    #remote-video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    #overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      background: rgba(0,0,0,0.8);
      z-index: 10;
    }
    .status-box {
      background: rgba(255,255,255,0.1);
      padding: 30px;
      border-radius: 12px;
      text-align: center;
      backdrop-filter: blur(10px);
    }
  </style>
</head>
<body>
  <div id="overlay">
    <div class="status-box">
      <h2>Connecting...</h2>
      <p id="status-text">Negotiating WebRTC connection...</p>
    </div>
  </div>
  <video id="remote-video" autoplay playsinline></video>
  <script src="viewer.js"></script>
</body>
</html>
